  artifacts:
    when: always
    paths:
      - install
      - build/Testing/Temporary


# Check compatibility of IPC protocol between 32 and 64 bits
ipc-32-64-compatibility:
  stage: check
  extends:
    - .build-rules
  dependencies: ["debian:bookworm", "debian:bookworm:32bit"]
  needs: ["debian:bookworm", "debian:bookworm:32bit"]
  script:
    - diff -du "debian:bookworm/ipc-sizes.txt" "debian:bookworm:32bit/ipc-sizes.txt"
    - cmp "debian:bookworm/ipc-sizes.txt" "debian:bookworm:32bit/ipc-sizes.txt"

debian:trixie:clang-tidy:
  extends:
    - .build-rules
    - .monado.image.debian:trixie
  stage: check
  needs:
    - debian:trixie
  script:
    - run-clang-tidy -quiet -allow-no-checks -p build

ndk:arm64-v8a:clang-tidy:
  extends:
    - .build-rules
    - .monado.image.debian:trixie-ndk
  stage: check
  needs:
    - ndk:arm64-v8a
  script:
    - run-clang-tidy -quiet -p build


debian:trixie:package:
  extends:
    - .monado.image.debian:trixie
    - .monado.packaging.conditions
  variables:
    GIT_STRATEGY: clone
    DEBFULLNAME: "Monado CI"
    DEBEMAIL: "rylie.pavlik@collabora.com"
    DISTRO: debian
    CODENAME: trixie
    DEB_VERSION_SUFFIX: bpo13
  stage: package
  before_script:
    - git config --global user.name Monado CI
    - git config --global user.email rylie.pavlik@collabora.com
