# Style check job
format-and-spellcheck:
  extends:
    - .monado.image.debian:bookworm

  stage: verify
  script:
    - scripts/format-and-spellcheck.sh
  artifacts:
    paths:
      - patches/
    expire_in: 1 week
    when: on_failure

# Verify REUSE compliance
reuse:
  extends:
    - .build-rules
  stage: verify
  image:
    name: fsfe/reuse:latest
    entrypoint: [""]
  script:
    - reuse lint


debian:trixie:
  stage: build
  extends:
    - .monado.packaging.conditions
    - .monado.image.debian:trixie

  before_script:
    - pushd doc/changes
    - proclamation build vNEXT
    - popd

  script:
    - .gitlab-ci/prebuild.sh
    - .gitlab-ci/ci-cmake-build.sh -DBUILD_DOC=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
    - cd build && ctest --output-on-failure

  artifacts:
    untracked: true
    paths:
      - build

debian:trixie:opencv-off:
  stage: build
  extends:
    - .monado.image.debian:trixie

  script:
    - .gitlab-ci/prebuild.sh
    - .gitlab-ci/ci-cmake-build.sh -DXRT_HAVE_OPENCV=OFF
    - cd build && ctest --output-on-failure


