debian:trixie:32bit:
  stage: build
  extends:
    - .monado.image.debian:trixie

  script:
    - .gitlab-ci/prebuild.sh
    - .gitlab-ci/ci-cmake-build.sh -DCMAKE_TOOLCHAIN_FILE=.gitlab-ci/i386.cmake -DXRT_HAVE_OPENCV=OFF
    - cd build && ctest --output-on-failure


debian:bookworm:
  stage: build
  extends:
    - .monado.image.debian:bookworm

  script:
    - .gitlab-ci/prebuild.sh
    - .gitlab-ci/ci-cmake-build.sh -DCMAKE_BUILD_TYPE=Debug
    - mkdir -p "debian:bookworm"
    - pahole --sizes --class_name file://build/ipc-structs.txt build/src/xrt/targets/openxr/libopenxr_monado.so > "debian:bookworm/ipc-sizes.txt"
    - cd build && ctest --output-on-failure

  artifacts:
    paths:
      - debian:bookworm/ipc-sizes.txt

